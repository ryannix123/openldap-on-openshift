---
- name: Deploy OpenLDAP on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

  vars_prompt:
    - name: ldap_base_dn
      prompt: "LDAP base DN"
      default: "dc=example,dc=com"
      private: false

    - name: ldap_org
      prompt: "Organization name"
      default: "Example Organization"
      private: false

    - name: admin_password
      prompt: "Admin bind DN password"
      private: true
      confirm: true

    - name: readonly_password
      prompt: "Read-only bind DN password"
      private: true
      confirm: true

  tasks:
    - name: Get current OpenShift namespace
      ansible.builtin.command: oc project -q
      register: oc_project
      changed_when: false

    - name: Set namespace fact
      ansible.builtin.set_fact:
        ocp_namespace: "{{ oc_project.stdout | trim }}"

    - name: Show target namespace
      ansible.builtin.debug:
        msg: "Deploying into namespace: {{ ocp_namespace }}"

    - name: Create admin credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: openldap-admin
            namespace: "{{ ocp_namespace }}"
            labels:
              app: openldap
          type: Opaque
          stringData:
            admin-password: "{{ admin_password }}"
            readonly-password: "{{ readonly_password }}"

    # Service must exist before Deployment so the cert controller
    # can inject the openldap-tls Secret before slapd starts.
    - name: Apply Service
      kubernetes.core.k8s:
        state: present
        namespace: "{{ ocp_namespace }}"
        src: manifests/service.yaml

    - name: Wait for OpenShift cert controller to inject TLS secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: openldap-tls
        namespace: "{{ ocp_namespace }}"
      register: tls_secret_check
      until: tls_secret_check.resources | length > 0
      retries: 12
      delay: 5

    - name: Apply PVC, ConfigMap, and Deployment
      kubernetes.core.k8s:
        state: present
        namespace: "{{ ocp_namespace }}"
        src: "{{ item }}"
      loop:
        - manifests/pvc.yaml
        - manifests/configmap-cabundle.yaml
        - manifests/deployment.yaml

    - name: Set LDAP base DN and org in Deployment
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        name: openldap
        namespace: "{{ ocp_namespace }}"
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: slapd
                    env:
                      - name: LDAP_BASE_DN
                        value: "{{ ldap_base_dn }}"
                      - name: LDAP_ORG
                        value: "{{ ldap_org }}"

    - name: Wait for rollout to complete
      kubernetes.core.k8s_info:
        kind: Deployment
        name: openldap
        namespace: "{{ ocp_namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - " OpenLDAP deployed successfully"
          - "================================================"
          - " Namespace:        {{ ocp_namespace }}"
          - " Base DN:          {{ ldap_base_dn }}"
          - " Admin DN:         cn=admin,{{ ldap_base_dn }}"
          - " Readonly DN:      cn=readonly,{{ ldap_base_dn }}"
          - " LDAP  (in-ns):    ldap://openldap:389"
          - " LDAPS (in-ns):    ldaps://openldap:636"
          - " LDAPS (cross-ns): ldaps://openldap.{{ ocp_namespace }}.svc.cluster.local:636"
          - " CA bundle:        ConfigMap/openldap-ca-bundle → service-ca.crt"
          - "================================================"
