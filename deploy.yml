---
- name: Deploy lldap on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

  vars_prompt:
    - name: ldap_base_dn
      prompt: "LDAP base DN"
      default: "dc=example,dc=com"
      private: false

    - name: jwt_secret
      prompt: "JWT secret (long random string)"
      private: true
      confirm: true

    - name: admin_password
      prompt: "lldap admin password"
      private: true
      confirm: true

  tasks:
    - name: Get current OpenShift namespace
      ansible.builtin.command: oc project -q
      register: oc_project
      changed_when: false

    - name: Set namespace fact
      ansible.builtin.set_fact:
        ocp_namespace: "{{ oc_project.stdout | trim }}"

    - name: Show target namespace
      ansible.builtin.debug:
        msg: "Deploying into namespace: {{ ocp_namespace }}"

    - name: Create lldap secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: lldap-secret
            namespace: "{{ ocp_namespace }}"
            labels:
              app: lldap
          type: Opaque
          stringData:
            jwt-secret: "{{ jwt_secret }}"
            admin-password: "{{ admin_password }}"

    - name: Apply Service (required before Deployment for TLS cert injection)
      kubernetes.core.k8s:
        state: present
        namespace: "{{ ocp_namespace }}"
        src: manifests/service.yaml

    - name: Wait for OpenShift cert controller to inject TLS secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: lldap-tls
        namespace: "{{ ocp_namespace }}"
      register: tls_secret_check
      until: tls_secret_check.resources | length > 0
      retries: 12
      delay: 5

    - name: Apply PVC, Deployment, and Route
      kubernetes.core.k8s:
        state: present
        namespace: "{{ ocp_namespace }}"
        src: "{{ item }}"
      loop:
        - manifests/pvc.yaml
        - manifests/deployment.yaml
        - manifests/route.yaml

    - name: Patch LDAP base DN into Deployment
      ansible.builtin.command: >
        oc set env deployment/lldap
        LLDAP_LDAP_BASE_DN={{ ldap_base_dn }}
        -n {{ ocp_namespace }}
      changed_when: true

    - name: Wait for rollout
      kubernetes.core.k8s_info:
        kind: Deployment
        name: lldap
        namespace: "{{ ocp_namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Get web UI route
      kubernetes.core.k8s_info:
        kind: Route
        name: lldap-web
        namespace: "{{ ocp_namespace }}"
      register: lldap_route

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - " lldap deployed successfully"
          - "================================================"
          - " Namespace:        {{ ocp_namespace }}"
          - " Base DN:          {{ ldap_base_dn }}"
          - " Admin DN:         uid=admin,ou=people,{{ ldap_base_dn }}"
          - " LDAP  (in-ns):    ldap://lldap:3890"
          - " LDAPS (in-ns):    ldaps://lldap:6360"
          - " Web UI:           https://{{ lldap_route.resources[0].spec.host }}"
          - "================================================"
