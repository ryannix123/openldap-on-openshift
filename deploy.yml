---
- name: Deploy or remove lldap on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    deploy_action: deploy

  tasks:
    - name: Get current OpenShift namespace
      ansible.builtin.command: oc project -q
      register: oc_project
      changed_when: false

    - name: Set namespace fact
      ansible.builtin.set_fact:
        ocp_namespace: "{{ oc_project.stdout | trim }}"

    - name: Show target namespace
      ansible.builtin.debug:
        msg: "Action: {{ deploy_action }} — namespace: {{ ocp_namespace }}"

    # -------------------------------------------------------------------------
    # CLEANUP
    # -------------------------------------------------------------------------
    - name: Remove all lldap resources
      when: deploy_action == "delete"
      block:
        # Step 1 — delete the Deployment first so pods stop before the PVC is released
        - name: Delete Deployment
          kubernetes.core.k8s:
            state: absent
            namespace: "{{ ocp_namespace }}"
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: lldap

        # Step 2 — wait for all lldap pods to terminate before touching the PVC
        - name: Wait for lldap pods to terminate
          kubernetes.core.k8s_info:
            kind: Pod
            namespace: "{{ ocp_namespace }}"
            label_selectors:
              - app=lldap
          register: lldap_pods
          until: lldap_pods.resources | length == 0
          retries: 24
          delay: 5

        # Step 3 — delete remaining resources including the PVC
        - name: Delete Service, Route, ConfigMap, Secrets, and PVC
          kubernetes.core.k8s:
            state: absent
            namespace: "{{ ocp_namespace }}"
            definition:
              apiVersion: "{{ item.api }}"
              kind: "{{ item.kind }}"
              metadata:
                name: "{{ item.name }}"
          loop:
            - { api: v1,                    kind: Service,               name: lldap }
            - { api: route.openshift.io/v1, kind: Route,                 name: lldap-web }
            - { api: v1,                    kind: ConfigMap,             name: lldap-ca-bundle }
            - { api: v1,                    kind: Secret,                name: lldap-secret }
            - { api: v1,                    kind: Secret,                name: lldap-tls }
            - { api: v1,                    kind: PersistentVolumeClaim, name: lldap-data }

        # Step 4 — wait for the PVC to fully release before returning
        - name: Wait for PVC to terminate
          kubernetes.core.k8s_info:
            kind: PersistentVolumeClaim
            name: lldap-data
            namespace: "{{ ocp_namespace }}"
          register: lldap_pvc
          until: lldap_pvc.resources | length == 0
          retries: 24
          delay: 5

        - name: Cleanup summary
          ansible.builtin.debug:
            msg:
              - "================================================"
              - " lldap removed from {{ ocp_namespace }}"
              - " All resources and user data deleted."
              - "================================================"

    # -------------------------------------------------------------------------
    # DEPLOY
    # -------------------------------------------------------------------------
    - name: Deploy lldap
      when: deploy_action == "deploy"
      block:
        - name: Prompt for LDAP base DN
          ansible.builtin.pause:
            prompt: "LDAP base DN [dc=example,dc=com]"
          register: ldap_base_dn_input

        - name: Prompt for JWT secret
          ansible.builtin.pause:
            prompt: "JWT secret (or press Enter to generate one)"
            echo: false
          register: jwt_secret_input

        - name: Generate JWT secret if not provided
          ansible.builtin.set_fact:
            jwt_secret: "{{ jwt_secret_input.user_input if jwt_secret_input.user_input else lookup('pipe', 'openssl rand -hex 32') }}"

        - name: Prompt for admin password
          ansible.builtin.pause:
            prompt: "lldap admin password (8 character minimum)"
            echo: false
          register: admin_password_input

        - name: Set deploy facts
          ansible.builtin.set_fact:
            ldap_base_dn: "{{ ldap_base_dn_input.user_input if ldap_base_dn_input.user_input else 'dc=example,dc=com' }}"
            admin_password: "{{ admin_password_input.user_input }}"

        - name: Create lldap secret
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: lldap-secret
                namespace: "{{ ocp_namespace }}"
                labels:
                  app: lldap
              type: Opaque
              stringData:
                jwt-secret: "{{ jwt_secret }}"
                admin-password: "{{ admin_password }}"

        - name: Apply Service (required before Deployment for TLS cert injection)
          kubernetes.core.k8s:
            state: present
            namespace: "{{ ocp_namespace }}"
            src: manifests/service.yaml

        - name: Wait for OpenShift cert controller to inject TLS secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: lldap-tls
            namespace: "{{ ocp_namespace }}"
          register: tls_secret_check
          until: tls_secret_check.resources | length > 0
          retries: 12
          delay: 5

        - name: Apply PVC, Deployment, and Route
          kubernetes.core.k8s:
            state: present
            namespace: "{{ ocp_namespace }}"
            src: "{{ item }}"
          loop:
            - manifests/pvc.yaml
            - manifests/deployment.yaml
            - manifests/route.yaml

        - name: Patch LDAP base DN into Deployment
          ansible.builtin.command: >
            oc set env deployment/lldap
            LLDAP_LDAP_BASE_DN={{ ldap_base_dn }}
            -n {{ ocp_namespace }}
          changed_when: true

        - name: Wait for rollout
          kubernetes.core.k8s_info:
            kind: Deployment
            name: lldap
            namespace: "{{ ocp_namespace }}"
            wait: true
            wait_condition:
              type: Available
              status: "True"
            wait_timeout: 120

        - name: Get web UI route host
          ansible.builtin.command: >
            oc get route lldap-web -n {{ ocp_namespace }} -o jsonpath='{.spec.host}'
          register: lldap_route_host
          changed_when: false

        - name: Deployment summary
          ansible.builtin.debug:
            msg:
              - "================================================"
              - " lldap deployed successfully"
              - "================================================"
              - " Namespace:        {{ ocp_namespace }}"
              - " Base DN:          {{ ldap_base_dn }}"
              - " Admin DN:         uid=admin,ou=people,{{ ldap_base_dn }}"
              - " LDAP  (in-ns):    ldap://lldap:3890"
              - " LDAPS (in-ns):    ldaps://lldap:6360"
              - " Web UI:           https://{{ lldap_route_host.stdout }}"
              - "================================================"
