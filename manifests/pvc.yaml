apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-storage
  labels:
    app: openldap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Covers both /var/lib/ldap (data) and /etc/openldap/slapd.d (OLC config)
      # via subPath mounts. 1Gi is generous for an in-namespace auth service.
      storage: 1Gi
  # Uncomment and set if your cluster has a specific StorageClass for RWO:
  # storageClassName: gp3-csi
