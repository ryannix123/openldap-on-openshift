apiVersion: v1
kind: Service
metadata:
  name: openldap
  labels:
    app: openldap
  annotations:
    # OpenShift service cert controller injects a TLS cert/key signed by the
    # cluster's internal CA into the named Secret. The cluster CA is already
    # trusted by all pods — no cert-manager or manual PKI needed.
    service.beta.openshift.io/serving-cert-secret-name: openldap-tls
spec:
  selector:
    app: openldap
  ports:
    - name: ldap
      port: 389
      targetPort: 1389
      protocol: TCP
    - name: ldaps
      port: 636
      targetPort: 1636
      protocol: TCP
  type: ClusterIP
