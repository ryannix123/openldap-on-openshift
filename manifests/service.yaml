apiVersion: v1
kind: Service
metadata:
  name: lldap
  labels:
    app: lldap
  annotations:
    # OpenShift injects a TLS cert/key for LDAPS into the named Secret.
    service.beta.openshift.io/serving-cert-secret-name: lldap-tls
spec:
  selector:
    app: lldap
  ports:
    - name: ldap
      port: 3890
      targetPort: 3890
      protocol: TCP
    - name: ldaps
      port: 6360
      targetPort: 6360
      protocol: TCP
    - name: web
      port: 17170
      targetPort: 17170
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lldap-ca-bundle
  labels:
    app: lldap
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
