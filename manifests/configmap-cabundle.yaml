apiVersion: v1
kind: ConfigMap
metadata:
  name: openldap-ca-bundle
  labels:
    app: openldap
  annotations:
    # OpenShift injects the cluster's service CA into the key 'service-ca.crt'.
    # Mount this ConfigMap into any application pod that needs to verify the
    # LDAPS certificate (i.e. set LDAPTLS_CACERT or equivalent to that file).
    service.beta.openshift.io/inject-cabundle: "true"
# The service-ca.crt key is populated automatically — do not add data here.
