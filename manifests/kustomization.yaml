apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply a common namespace label so all objects can be selected together.
# Override namespace at deploy time:
#   oc apply -k manifests/ -n my-app-namespace
commonLabels:
  app.kubernetes.io/name: openldap
  app.kubernetes.io/component: authentication

resources:
  - secret-admin.yaml
  - pvc.yaml
  - service.yaml          # Must be created before Deployment so cert controller
  - deployment.yaml       # can inject the TLS secret before slapd starts.
  - configmap-cabundle.yaml
