apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  labels:
    app: openldap
spec:
  replicas: 1
  # Recreate: only one slapd writer against the mdb PVC at a time.
  # RollingUpdate would cause two pods to race on the same lmdb file.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      # No serviceAccountName needed — default SA is sufficient.
      # No securityContext.runAsUser — OpenShift assigns an arbitrary UID
      # from the namespace's UID range. GID 0 group-write on dirs handles access.
      containers:
        - name: slapd
          image: quay.io/ryan_nix/openldap-openshift:latest
          imagePullPolicy: Always
          ports:
            - name: ldap
              containerPort: 1389
              protocol: TCP
            - name: ldaps
              containerPort: 1636
              protocol: TCP

          env:
            # --------------- LDAP topology (safe to commit) ---------------
            - name: LDAP_BASE_DN
              value: "dc=example,dc=com"
            - name: LDAP_ORG
              value: "Example Organization"
            # 256 = stats logging; set to 0 for quiet production operation
            - name: LDAP_LOG_LEVEL
              value: "256"

            # --------------- Secrets (never commit real values) -----------
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-admin
                  key: admin-password
            - name: LDAP_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-admin
                  key: readonly-password

          volumeMounts:
            # LDAP database (mdb files)
            - name: storage
              mountPath: /var/lib/ldap
              subPath: data
            # OLC runtime config (cn=config tree)
            - name: storage
              mountPath: /etc/openldap/slapd.d
              subPath: config
            # TLS cert + key injected by OpenShift service cert controller
            - name: tls
              mountPath: /etc/openldap/certs
              readOnly: true

          readinessProbe:
            tcpSocket:
              port: 1389
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 1389
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: openldap-storage
        - name: tls
          secret:
            secretName: openldap-tls
            # The cert controller populates this Secret after the Service exists.
            # optional: true lets the pod start even if the secret isn't ready yet;
            # the entrypoint will degrade gracefully to plain LDAP in that case.
            optional: true
            defaultMode: 0440
