name: Build and Push OpenLDAP Image

on:
  schedule:
    # Weekly Sunday at 06:00 UTC — picks up updated CentOS Stream 10 base + openldap-servers
    - cron: '0 6 * * 0'
  push:
    branches: [main]
    paths-ignore:
      - 'manifests/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Detect OpenLDAP version from upstream
        id: version
        run: |
          VERSION=$(docker run --rm --pull always quay.io/centos/centos:stream10 \
            bash -c "dnf info openldap-servers 2>/dev/null | awk '/^Version[[:space:]]*:/{print \$3; exit}'")
          # Fallback: use date-based tag if dnf query fails
          if [ -z "$VERSION" ]; then
            VERSION=$(date -u +%Y%m%d)
            echo "WARNING: Could not detect openldap-servers version, using date tag: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected openldap-servers version: ${VERSION}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/ryan_nix/openldap-openshift:latest
            quay.io/ryan_nix/openldap-openshift:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed quay.io/ryan_nix/openldap-openshift:${{ steps.version.outputs.version }}"