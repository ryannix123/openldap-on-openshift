name: Build and Push lldap Image

on:
  schedule:
    # Weekly Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  push:
    branches: [main]
    paths-ignore:
      - 'manifests/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Detect lldap version from upstream
        id: version
        run: |
          VERSION=$(docker run --rm --pull always docker.io/lldap/lldap:stable \
            /app/lldap --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(date -u +%Y%m%d)
            echo "WARNING: Could not detect lldap version, using date tag: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected lldap version: ${VERSION}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/ryan_nix/lldap-openshift:latest
            quay.io/ryan_nix/lldap-openshift:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Image digest
        run: echo "Pushed quay.io/ryan_nix/lldap-openshift:${{ steps.version.outputs.version }}"
